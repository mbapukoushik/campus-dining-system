version: '3.8'

services:
  mongodb:
    image: mongo:7.0
    container_name: campus-dining-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

  redis:
    image: redis:alpine
    container_name: campus-dining-redis
    ports:
      - "6379:6379"

volumes:
  mongodb_data:
